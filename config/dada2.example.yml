workspace:
  root: "./output/dada2/"
  input_dir: "./output/cutadapt/"   # path to trimmed FASTQ directory

file_patterns:
  forward: "_R1_trimmed.fastq.gz"
  reverse: "_R2_trimmed.fastq.gz"
  sample_name_split: "_"
  sample_name_index: 1
  mode: "paired"              # paired | forward | reverse

filter_trim:
  trunc_q: 2
  trunc_len: [220, 220]       # [forward, reverse]; first value used for single-end
  max_ee: [3, 3]
  min_len: 175
  max_n: 0
  match_ids: true
  rm_phix: true

dada:
  seed: 123
  nbases: 200000000
  max_consist: 15
  pool_method: "pseudo"       # none | pseudo | true

merge:
  min_overlap: 20
  max_mismatch: 0
  trim_overhang: true

asv:
  band_size_min: 200          # null to skip length filtering
  band_size_max: 430
  denovo_method: "consensus"

databases:
  dir: "./databases"          # shared cache directory; absolute or relative to working directory
  pr2:
    dada2:
      uri: "https://github.com/pr2database/pr2database/releases/download/v5.0.0/pr2_version_5.0.0_SSU_dada2.fasta.gz"
      local: ~                # set to a local path to skip download
    vsearch:
      uri: "https://github.com/pr2database/pr2database/releases/download/v5.1.0.0/pr2_version_5.1.0_SSU_taxo_long.fasta.gz"
      local: ~                # set to a local path to skip download

taxonomy:
  database: pr2               # key into databases: section above
  multithread: 4              # higher values increase memory use significantly (mclapply forks one process per thread)
  # DISCLAIMER: Configuring a remote host causes this pipeline to connect via SSH,
  # transfer files, execute Rscript, and delete the staging directory on the remote
  # server. You are solely responsible for ensuring you have authorisation to use
  # the configured host and that staging_dir is a safe path to write to and delete.
  # The authors accept no liability for data loss or misuse arising from this feature.
  remote:                     # omit or set host to null to run locally
    host: ~                   # user@hostname
    rscript: "Rscript"        # path to Rscript on the server
    staging_dir: "/absolute/path/on/server"  # must be an explicit absolute path on the server
    db_path: ~                # path to pre-installed database on server; null to transfer local copy
  min_boot: 0
  levels:
    - "Domain"
    - "Supergroup"
    - "Division"
    - "Subdivision"
    - "Class"
    - "Order"
    - "Family"
    - "Genus"
    - "Species"

output:
  seq_table_prefix: "seqtab_nochim"
  fasta_prefix: "asvs"
  taxa_prefix: "taxonomy"
  combined_filename: "tax_counts.csv"
  asv_filename: "asv_counts.csv"

verbose: true
