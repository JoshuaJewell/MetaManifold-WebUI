# Shared database configuration for all projects.
# Copy to config/databases.yml and set local: paths for pre-downloaded files.

databases:
  dir: "./databases"          # shared cache directory; absolute or relative to working directory
  pr2:
    dada2:
      uri: "https://github.com/pr2database/pr2database/releases/download/v5.0.0/pr2_version_5.0.0_SSU_dada2.fasta.gz"
      local: ~                # set to a local path to skip download
      remote_path: ~          # pre-existing path on remote host (avoids transferring the file)
    vsearch:
      uri: "https://github.com/pr2database/pr2database/releases/download/v5.1.0.0/pr2_version_5.1.0_SSU_taxo_long.fasta.gz"
      local: ~                # set to a local path to skip download
    levels:
      - Domain
      - Supergroup
      - Division
      - Subdivision
      - Class
      - Order
      - Family
      - Genus
      - Species
    vsearch_format: pr2       # pipe-separated: Acc|rRNA|Org|spec|Domain|...|Species
    corrections:
      - source: Division
        target: Supergroup
        values:
          Rhizaria: Rhizaria
          Alveolata: Alveolata
          Stramenopiles: Stramenopiles
          Hemimastigophora: Hemimastigophora
          Discoba: Discoba
          Metamonada: Metamonada
          Telonemia: Telonemia
          Ancyromonadida: Ancyromonadida
