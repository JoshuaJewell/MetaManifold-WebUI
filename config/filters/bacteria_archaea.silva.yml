# Bacteria + Archaea filter — retains all prokaryotic ASVs.
# Covers Firmicutes, Bacteroidota, Cyanobacteria, Proteobacteria,
# Spirochaetota, and all Archaea (Euryarchaeota, Crenarchaeota, etc.).
databases: [silva]

filters:
  - column: Kingdom
    pattern: "Bacteria|Archaea"
    regex: true
    action: keep

remove_empty:
  - Kingdom
