# Protist filter - retains free-living and parasitic protists.
# Only applied when the active database is in the 'databases' list below.
databases: [pr2]
# Excludes: Bacteria, Archaea, organellar sequences, chromista sensu stricto,
#           Metazoa, Fungi, Rhodophyta, Embryophyta (land plants).
#
# PR2 Division→Supergroup corrections are applied globally during
# merge_taxonomy_counts, so no mappings are needed here.

filters:
  - column: Domain
    pattern: "Bacteria|Archaea"
    regex: true
  - column: Domain
    pattern: "Eukaryota:plas|Eukaryota:mito"
    regex: true
  - column: Supergroup
    pattern: "TSAR:chro"
  - column: Subdivision
    pattern: "Metazoa|Fungi"
    regex: true
  - column: Division
    pattern: Rhodophyta
  - column: Class
    pattern: Embryophyceae

remove_empty:
  - Domain
