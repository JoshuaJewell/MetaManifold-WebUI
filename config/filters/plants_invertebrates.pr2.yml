# Plants + non-helminth invertebrates (dietary / environmental contamination).
# Keeps: Streptophyta, Chlorophyta (plants & green algae),
#        Annelida (Achaeta), Miculenchus (moss-associated nematode).
# Strategy: exclude all other groups rather than OR-ing keeps.
databases: [pr2]

filters:
  - column: Domain
    pattern: "Bacteria|Archaea"
    regex: true
  - column: Domain
    pattern: "Eukaryota:plas|Eukaryota:mito"
    regex: true
  - column: Subdivision
    pattern: "Fungi|Apicomplexa|Ciliophora|Chrompodellids|Parabasalia|Fornicata|Cercozoa|Bigyra|Gyrista|Euglenozoa|Eumycetozoa|Foraminifera|Rhodophyta_X|Prasinodermophyta_X|Discoba_X"
    regex: true
  - column: Class
    pattern: Craniata
  - column: Genus
    pattern: "Trichuris|Strongyloides"
    regex: true

remove_empty:
  - Domain
