# Helminth filter - retains parasitic nematodes only.
# Keeps Nematoda (Trichuris, Strongyloides) but excludes Miculenchus
# (a moss-associated tylenchid, not a medical helminth).
databases: [pr2]

filters:
  - column: Class
    pattern: Nematoda
    action: keep
  - column: Genus
    pattern: Miculenchus

remove_empty:
  - Class
