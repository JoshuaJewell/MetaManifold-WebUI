# Parasitic protozoa - host-associated protists.
#
# Apicomplexa:    Eimeria, Isospora (gut coccidians); Monocystis,
#                 Amoebogregarina, Leidyana (invertebrate gregarines)
# Parabasalia:    Simplicimonas similis, Hexamastix kirbyi (gut flagellates)
# Fornicata:      Iotanema spirale, Hexamita sp. (gut diplomonads)
# Bigyra:         Blastocystis, Proteromonas lacertae (gut commensals/parasites)
databases: [pr2]

filters:
  - column: Subdivision
    pattern: "Apicomplexa|Parabasalia|Fornicata|Bigyra"
    regex: true
    action: keep

remove_empty:
  - Subdivision
