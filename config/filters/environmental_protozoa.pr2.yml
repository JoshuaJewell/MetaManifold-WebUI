# Environmental (free-living) protozoa.
#
# Cercozoa:        soil amoeboflagellates (Cercomonas, Sandona, etc.)
# Gyrista:         Chrysophyceae (Spumella), Xanthophyceae (Botrydiopsis)
# Ciliophora:      Colpodea (soil ciliate), Litostomatea
# Chrompodellids:  Colpodellida (free-living predatory flagellate)
databases: [pr2]

filters:
  - column: Subdivision
    pattern: "Cercozoa|Gyrista|Ciliophora|Chrompodellids"
    regex: true
    action: keep

remove_empty:
  - Subdivision
