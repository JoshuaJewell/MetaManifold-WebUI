# Plants + invertebrates (dietary / environmental contamination).
# Strategy: exclude all other major groups.
#
# Note: SILVA cannot distinguish vertebrates from invertebrates — all
# metazoa resolve to Family=Holozoa. This filter retains all metazoa
# alongside plants. Use PR2 for vertebrate-specific exclusion.
databases: [silva]

filters:
  - column: Kingdom
    pattern: "Bacteria|Archaea"
    regex: true
  - column: Family
    pattern: Nucletmycea
  - column: Family
    pattern: "Conoidasida|Trichomonadea|Blastocystis|Proteromonadea"
    regex: true
  - column: Order
    pattern: "Cercozoa|Ciliophora|Ochrophyta"
    regex: true

remove_empty:
  - Kingdom
