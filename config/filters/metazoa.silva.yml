# Host contamination filter — retains metazoan sequences (SILVA limitation).
#
# SILVA's 6-rank eukaryotic hierarchy resolves all metazoa (vertebrates,
# nematodes, annelids) to Family=Holozoa. This filter cannot distinguish
# vertebrates from invertebrates. Use PR2 for vertebrate-specific filtering.
databases: [silva]

filters:
  - column: Family
    pattern: Holozoa
    action: keep

remove_empty:
  - Family
