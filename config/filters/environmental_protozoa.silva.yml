# Environmental (free-living) protozoa.
#
# SILVA equivalents of PR2 groups:
#   Cercozoa       -> Order: Cercozoa (Cercomonas, Heteromita; under Class Rhizaria)
#   Ciliophora     -> Order: Ciliophora (Litostomatea, Colpodea; under Class Alveolata)
#   Gyrista        -> Order: Ochrophyta (Chrysophyceae, Xanthophyceae; under Class Stramenopiles)
#
# Note: Chrompodellids (Colpodellida) cannot be separated in SILVA's
# 6-rank hierarchy; they fall under Alveolata without a distinct Order.
databases: [silva]

filters:
  - column: Order
    pattern: "Cercozoa|Ciliophora|Ochrophyta"
    regex: true
    action: keep

remove_empty:
  - Order
