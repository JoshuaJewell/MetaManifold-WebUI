# Fungi filter - retains all fungal ASVs.
# PR2 taxonomy: Opisthokonta > Fungi > (Basidiomycota, Ascomycota,
# Mucoromycota, Chytridiomycota, Blastocladiomycota, Neocallimastigomycota).
databases: [pr2]

filters:
  - column: Subdivision
    pattern: Fungi
    action: keep

remove_empty:
  - Subdivision
