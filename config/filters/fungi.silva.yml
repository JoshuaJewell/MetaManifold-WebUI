# Fungi filter — retains all fungal ASVs.
# SILVA taxonomy: Amorphea > Obazoa > Opisthokonta > Nucletmycea.
# Nucletmycea is the Family-level clade containing all Fungi in SILVA's
# 6-rank eukaryotic hierarchy.
databases: [silva]

filters:
  - column: Family
    pattern: Nucletmycea
    action: keep

remove_empty:
  - Family
