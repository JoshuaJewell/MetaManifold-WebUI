dada2:
  filter_trim:
    min_len: 100
    trunc_q: 2
    trunc_len:
      - 240
      - 160
    max_ee:
      - 2
      - 2
  taxonomy:
    database: "pr2"
merge_taxa:
  filters:
    - "bacteria_archaea.pr2.yml"
analysis:
  alpha:
    annotate_significance: true
    pairwise_brackets: true
cutadapt:
  primer_pairs:
    - "EMP"
  discard_untrimmed: false
  min_length: 100
swarm:
  chimera_check: true
  differences: 1
  min_abundance: 2
