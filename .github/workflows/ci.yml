name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Julia ${{ matrix.julia-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        julia-version: ["1"]   # latest stable (Manifest.toml is version-pinned)
        os: [ubuntu-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.julia-version }}

      - name: Cache Julia packages
        uses: julia-actions/cache@v2

      # R + required packages (needed by RCall)
      # Install R directly via apt to avoid r-lib/actions/setup-r mangling
      # R_HOME and stripping default packages (utils, methods, stats, etc.)
      - name: Set up R
        run: |
          wget -qO- https://cloud.r-project.org/bin/linux/ubuntu/marutter_pubkey.asc \
            | sudo gpg --dearmor -o /usr/share/keyrings/r-project.gpg
          echo "deb [signed-by=/usr/share/keyrings/r-project.gpg] https://cloud.r-project.org/bin/linux/ubuntu $(lsb_release -cs)-cran40/" \
            | sudo tee /etc/apt/sources.list.d/r-project.list
          sudo apt-get update -qq
          sudo apt-get install -y r-base r-base-dev

      - name: Install R system dependencies
        run: sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev libfontconfig1-dev

      - name: Install R packages
        run: |
          sudo Rscript -e 'install.packages("BiocManager", repos="https://cloud.r-project.org", lib=.Library)'
          sudo Rscript -e 'BiocManager::install("dada2", ask=FALSE, lib=.Library)'
          sudo Rscript -e 'install.packages(c("vegan", "dplyr", "tibble"), repos="https://cloud.r-project.org", lib=.Library)'
          Rscript -e 'for (pkg in c("dada2","vegan","dplyr","tibble")) if (!require(pkg,character.only=TRUE,quietly=TRUE)) stop(pkg, " failed to install")'

      - name: Install cutadapt
        run: pip install cutadapt

      - name: Install cd-hit
        run: sudo apt-get install -y cd-hit

      - name: Install vsearch (latest release)
        run: |
          URL=$(curl -s https://api.github.com/repos/torognes/vsearch/releases/latest \
            | grep -oP '"browser_download_url":\s*"\K[^"]*linux-x86_64\.tar\.gz(?!.*ubi)' | head -1)
          echo "Downloading $URL"
          curl -sSL "$URL" | tar xz
          sudo mv vsearch-*/bin/vsearch /usr/local/bin/vsearch
          vsearch --version

      - name: Install swarm (latest release)
        run: |
          URL=$(curl -s https://api.github.com/repos/torognes/swarm/releases/latest \
            | grep -oP '"browser_download_url":\s*"\K[^"]*linux-x86_64[^"]*' | head -1)
          echo "Downloading $URL"
          curl -sSL "$URL" | tar xz
          sudo mv swarm-*/bin/swarm /usr/local/bin/swarm
          swarm --version

      - name: Instantiate Julia project
        run: julia --project=. -e 'import Pkg; Pkg.instantiate()'

      - name: Download PR2 databases
        run: julia --project=. config/ci/download_databases.jl

      - name: Rebuild RCall against installed R
        run: julia --project=. -e 'import Pkg; Pkg.build("RCall")'

      - name: Run tests
        env:
          CI_SKIP_TAXONOMY: "1"
        run: julia --project=. -t 2 --code-coverage=user --compiled-modules=no test/runtests.jl --integration

      - name: Process coverage
        uses: julia-actions/julia-processcoverage@v1

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          file: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: JoshuaJewell/MetaManifold-WebUI
          fail_ci_if_error: false
