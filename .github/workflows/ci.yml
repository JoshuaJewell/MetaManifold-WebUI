name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Julia ${{ matrix.julia-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        julia-version: ["1"]   # latest stable (Manifest.toml is version-pinned)
        os: [ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.julia-version }}

      - name: Cache Julia packages
        uses: julia-actions/cache@v2

      # R + required packages (needed by RCall)
      # Install R directly via apt to avoid r-lib/actions/setup-r mangling
      # R_HOME and stripping default packages (utils, methods, stats, etc.)
      - name: Set up R
        run: |
          wget -qO- https://cloud.r-project.org/bin/linux/ubuntu/marutter_pubkey.asc \
            | sudo gpg --dearmor -o /usr/share/keyrings/r-project.gpg
          echo "deb [signed-by=/usr/share/keyrings/r-project.gpg] https://cloud.r-project.org/bin/linux/ubuntu $(lsb_release -cs)-cran40/" \
            | sudo tee /etc/apt/sources.list.d/r-project.list
          sudo apt-get update -qq
          sudo apt-get install -y r-base r-base-dev

      - name: Install R system dependencies
        run: sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev libfontconfig1-dev

      - name: Install R packages
        run: |
          sudo Rscript -e 'install.packages("BiocManager", repos="https://cloud.r-project.org", lib=.Library)'
          sudo Rscript -e 'BiocManager::install("dada2", ask=FALSE, lib=.Library)'
          sudo Rscript -e 'install.packages(c("vegan", "dplyr"), repos="https://cloud.r-project.org", lib=.Library)'
          Rscript -e 'for (pkg in c("dada2","vegan","dplyr")) if (!require(pkg,character.only=TRUE,quietly=TRUE)) stop(pkg, " failed to install")'

      - name: Install cutadapt
        run: pip install cutadapt

      - name: Install cd-hit
        run: sudo apt-get install -y cd-hit

      - name: Install vsearch 2.29.2
        run: |
          curl -sSL "https://github.com/torognes/vsearch/releases/download/v2.29.2/vsearch-2.29.2-linux-x86_64.tar.gz" | tar xz
          sudo mv vsearch-2.29.2-linux-x86_64/bin/vsearch /usr/local/bin/vsearch
          vsearch --version

      - name: Install swarm 3.1.5
        run: |
          curl -sSL "https://github.com/torognes/swarm/releases/download/v3.1.5/swarm-3.1.5-linux-x86_64.tar.gz" | tar xz
          sudo mv swarm-3.1.5-linux-x86_64/bin/swarm /usr/local/bin/swarm
          swarm --version

      - name: Instantiate Julia project
        run: julia --project=. -e 'import Pkg; Pkg.instantiate()'

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build frontend
        working-directory: frontend
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Download PR2 databases
        run: julia --project=. config/ci/download_databases.jl

      - name: Rebuild RCall against installed R
        run: julia --project=. -e 'import Pkg; Pkg.build("RCall")'

      - name: Verify R packages visible from RCall
        run: |
          julia --project=. -e '
            using RCall
            R"cat(.libPaths(), sep=\"\n\")"
            for pkg in ["dada2", "dplyr", "vegan", "tibble"]
              R"if (!require($pkg, character.only=TRUE, quietly=TRUE)) stop($pkg, \" not found\")"
            end
          '

      - name: Run tests
        env:
          CI_SKIP_TAXONOMY: "1"
          R_LIBS_SITE: /usr/local/lib/R/site-library:/usr/lib/R/site-library:/usr/lib/R/library
        run: julia --project=. -t 2 --code-coverage=user --compiled-modules=no test/runtests.jl --integration

      - name: Process coverage
        uses: julia-actions/julia-processcoverage@v1

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          file: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: JoshuaJewell/MetaManifold-WebUI
          fail_ci_if_error: false
