name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Julia ${{ matrix.julia-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        julia-version: ["1"]   # latest stable (Manifest.toml is version-pinned)
        os: [ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.julia-version }}

      - name: Cache Julia packages
        uses: julia-actions/cache@v2

      # R + required packages (needed by RCall)
      # Install R directly via apt to avoid r-lib/actions/setup-r mangling
      # R_HOME and stripping default packages (utils, methods, stats, etc.)
      - name: Set up R
        run: |
          wget -qO- https://cloud.r-project.org/bin/linux/ubuntu/marutter_pubkey.asc \
            | sudo gpg --dearmor -o /usr/share/keyrings/r-project.gpg
          echo "deb [signed-by=/usr/share/keyrings/r-project.gpg] https://cloud.r-project.org/bin/linux/ubuntu $(lsb_release -cs)-cran40/" \
            | sudo tee /etc/apt/sources.list.d/r-project.list
          sudo apt-get update -qq
          sudo apt-get install -y r-base r-base-dev

      - name: Install R packages
        env:
          R_LIBS_USER: /usr/local/lib/R/site-library
        run: |
          sudo mkdir -p /usr/local/lib/R/site-library
          sudo chmod -R 777 /usr/local/lib/R/site-library
          Rscript -e 'install.packages("BiocManager", repos="https://cloud.r-project.org")'
          Rscript -e 'BiocManager::install("dada2", ask=FALSE)'
          Rscript -e 'install.packages("vegan", repos="https://cloud.r-project.org")'

      - name: Install cutadapt
        run: pip install cutadapt

      - name: Install cd-hit
        run: sudo apt-get install -y cd-hit

      - name: Install vsearch
        run: |
          curl -sSL https://github.com/torognes/vsearch/releases/download/v2.30.4/vsearch-2.30.4-linux-x86_64.tar.gz | tar xz
          sudo mv vsearch-2.30.4-linux-x86_64/bin/vsearch /usr/local/bin/vsearch

      - name: Install swarm
        run: |
          curl -sSL https://github.com/torognes/swarm/releases/download/v3.1.6/swarm-3.1.6-linux-x86_64.tar.gz | tar xz
          sudo mv swarm-3.1.6-linux-x86_64/bin/swarm /usr/local/bin/swarm

      - name: Instantiate Julia project
        run: julia --project=. -e 'import Pkg; Pkg.instantiate()'

      - name: Download PR2 databases
        run: julia --project=. config/ci/download_databases.jl

      - name: Rebuild RCall against installed R
        env:
          R_LIBS_USER: /usr/local/lib/R/site-library
        run: |
          julia --project=. -e 'import Pkg; Pkg.build("RCall")'
          echo "=== R library paths seen by RCall ==="
          julia --project=. -e '
            using RCall
            R"cat(paste(.libPaths(), collapse=\"\n\"))"
            R"cat(\"\\ndada2 installed:\", \"dada2\" %in% rownames(installed.packages()))"
          '

      - name: Run tests
        env:
          R_LIBS_USER: /usr/local/lib/R/site-library
        run: julia --project=. -t 2 --code-coverage=user --compiled-modules=no test/runtests.jl --integration

      - name: Process coverage
        uses: julia-actions/julia-processcoverage@v1

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: JoshuaJewell/MetaManifold
          fail_ci_if_error: false
